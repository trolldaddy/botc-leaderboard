<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>血染鐘樓：覆盤／紀錄／排行榜by 廚爹</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <style>
        @media (max-width: 900px) {
            .record-layout-wrapper { flex-direction: column !important; gap: 1rem !important; }
            .record-sidebar, .record-main { width: 100% !important; max-width: 100% !important; min-width: 0 !important; }
            .record-sidebar { height: auto !important; overflow: visible !important; }
            .sidebar-card { max-height: none !important; }
            .form-grid-3 { grid-template-columns: 1fr !important; }
            .submit-footer-sidebar { position: static !important; }
        }
        @media (max-width: 640px) {
            .main-content { padding-left: 1rem !important; padding-right: 1rem !important; overflow-x: hidden !important; }
            .record-layout-wrapper, .record-main, .record-sidebar, #record-form, .card { min-width: 0 !important; }
            .player-row { display: grid !important; grid-template-columns: 42px minmax(0, 1fr) !important; gap: .55rem !important; align-items: start !important; }
            .player-row > div { grid-column: 1 / -1 !important; width: 100% !important; min-width: 0 !important; }
            .player-row > div:first-child { grid-column: 1 !important; align-self: center !important; }
            .player-row > div:last-child { grid-column: 2 !important; text-align: right !important; }
            .player-row input, .player-row select { width: 100% !important; min-width: 0 !important; }
            .side-match-flex { align-items: flex-start !important; flex-wrap: wrap !important; }
            .side-mini-box { width: calc(50% - .35rem) !important; }
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/roles_db.js"></script>
    <script>
        let origin = window.location.origin;
        if (origin.endsWith('/')) origin = origin.slice(0, -1);
        window.API_BASE = origin;
        console.log("🚀 系統啟動，角色數據庫狀態:", window.MASTER_ROLE_DB ? "✅ 已載入" : "❌ 未載入");
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div class="background-effects">
        <div class="glow red-glow"></div>
        <div class="glow purple-glow"></div>
    </div>

    <nav class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-clock"></i>
            <h1>拉普拉斯 <span class="accent">血染名人堂</span></h1>
        </div>
        <button class="hamburger-btn" id="mobile-menu-btn">
            <span class="menu-hint">選單切換</span>
            <i class="fa-solid fa-bars"></i>
        </button>
    </nav>

    <ul class="nav-links" id="main-nav">
        <li class="active"><a href="#" data-page="dashboard"><i class="fa-solid fa-chart-line"></i> <span>數據看板</span></a></li>
        <li><a href="#" data-page="recorder"><i class="fa-solid fa-book-open"></i> <span>覆盤紀錄器</span></a></li>
        <li><a href="#" data-page="record"><i class="fa-solid fa-feather-pointed"></i> <span>錄入對局</span></a></li>
        <li><a href="#" data-page="history"><i class="fa-solid fa-clock-rotate-left"></i> <span>歷史紀錄＆戰績查詢</span></a></li>
        <li id="admin-nav-item" style="display:none;"><a href="#" data-page="admin"><i class="fa-solid fa-shield-halved"></i> <span>管理後台</span></a></li>
    </ul>

    <main class="main-content" id="content-area">
        <div class="loading">正在召喚魔典...</div>
    </main>

    <script>
        async function loadPage(pageName) {
            const area = document.getElementById('content-area');
            if (!area) return;
            area.style.opacity = '0.5';
            try {
                const response = await fetch(`/pages/${pageName}.html?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error("頁面載入失敗");
                const html = await response.text();
                area.innerHTML = html;
                const scripts = area.querySelectorAll('script');
                for (let oldScript of scripts) {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    if (oldScript.src) newScript.src = oldScript.src + '?v=' + new Date().getTime();
                    else newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                }
                if (window.Babel) window.Babel.transformScriptTags();
                area.style.opacity = '1';
                document.querySelectorAll('#main-nav li').forEach(li => {
                    const link = li.querySelector('a');
                    if (link.getAttribute('data-page') === pageName) li.classList.add('active');
                    else li.classList.remove('active');
                });
            } catch (err) {
                area.innerHTML = `<div class="card"><h3>無法載入頁面</h3><p>${err.message}</p></div>`;
                area.style.opacity = '1';
            }
        }

        async function revealAdminNav() {
            const adminItem = document.getElementById('admin-nav-item');
            if (!adminItem) return;
            try {
                const resp = await fetch(`${window.API_BASE || ''}/api/me`, { credentials: 'same-origin' });
                if (!resp.ok) return;
                const me = await resp.json();
                adminItem.style.display = me.is_admin ? 'flex' : 'none';
            } catch (err) {}
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('#main-nav a').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const page = e.currentTarget.getAttribute('data-page');
                    loadPage(page);
                    window.location.hash = page;
                    const navMenu = document.getElementById('main-nav');
                    if (navMenu.classList.contains('active')) navMenu.classList.remove('active');
                });
            });
            const menuBtn = document.getElementById('mobile-menu-btn');
            const navMenu = document.getElementById('main-nav');
            if (menuBtn && navMenu) {
                menuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    navMenu.classList.toggle('active');
                });
            }
            document.addEventListener('click', (e) => {
                if (navMenu && navMenu.classList.contains('active') && !navMenu.contains(e.target)) navMenu.classList.remove('active');
            });
            revealAdminNav();
            const hash = window.location.hash.replace('#', '');
            loadPage(hash || 'dashboard');
        });
    </script>
</body>
</html>
