<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood on the Clocktower - Leaderboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cinzel:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="dashboard-body">
    <div class="background-effects">
        <div class="glow red-glow"></div>
        <div class="glow purple-glow"></div>
    </div>

    <nav class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-clock"></i>
            <h1>BOTC <span class="accent">Stats</span></h1>
        </div>
        <ul class="nav-links">
            <li class="active"><a href="index.html"><i class="fa-solid fa-chart-line"></i> 数据看板</a></li>
            <li><a href="record.html"><i class="fa-solid fa-feather-pointed"></i> 录入对局</a></li>
            <li><a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i> 历史记录</a></li>
        </ul>
        <div class="nav-footer">
            <div id="connection-status" class="status online">
                <span class="dot"></span> 魔法书已连接 (后端在线)
            </div>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-header">
            <h2>钟楼神域总览</h2>
            <div class="stats-overview">
                <div class="stat-badge">
                    <span class="label">总对局数</span>
                    <span class="value" id="val-total-matches">-</span>
                </div>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- 胜率榜 -->
            <div class="card col-span-2 ranked-players">
                <div class="card-header">
                    <h3><i class="fa-solid fa-crown text-gold"></i> 玩家胜率龙虎榜</h3>
                    <div class="filter-tabs" id="player-filter">
                        <button class="active" data-team="all">全部</button>
                        <button class="text-blue" data-team="good">好人</button>
                        <button class="text-red" data-team="bad">坏人</button>
                    </div>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>玩家名称</th>
                                <th>场次</th>
                                <th>胜率</th>
                                <th>进度</th>
                            </tr>
                        </thead>
                        <tbody id="players-tbody">
                            <tr>
                                <td colspan="5" class="loading">正在召唤恶灵...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 最常玩角色/胜率最高角色 -->
            <div class="card top-characters">
                <div class="card-header">
                    <h3><i class="fa-solid fa-masks-theater text-purple"></i> 角色出场统计</h3>
                </div>
                <div class="character-list" id="characters-list">
                    <div class="loading">正在与恶魔沟通...</div>
                    <!-- 动态注入 -->
                </div>
            </div>

            <!-- Hall of Fame 卡片 -->
            <div class="card highlight-card bg-gradient-dark">
                <h3>荣誉殿堂 (Hall of Fame)</h3>
                <div class="highlight-item mt-4">
                    <div class="highlight-icon bg-red"><i class="fa-solid fa-skull"></i></div>
                    <div class="highlight-info">
                        <span class="title">最强坏种 (坏人胜率最高)</span>
                        <span class="name text-red" id="best-evil-player">-</span>
                    </div>
                </div>
                <div class="highlight-item mt-3">
                    <div class="highlight-icon bg-blue"><i class="fa-solid fa-shield-halved"></i></div>
                    <div class="highlight-info">
                        <span class="title">镇火圣卫 (好人胜率最高)</span>
                        <span class="name text-blue" id="best-good-player">-</span>
                    </div>
                </div>
                <div class="highlight-item mt-3">
                    <div class="highlight-icon bg-purple"><i class="fa-solid fa-bed"></i></div>
                    <div class="highlight-info">
                        <span class="title">超人气角色 (最常出场)</span>
                        <span class="name text-purple" id="most-played-char">-</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>

</html>
