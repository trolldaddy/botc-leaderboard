<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>血染鐘樓戰績魔典</title>
    
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 額外優化：確保內容區域有足夠高度且滾動順暢 */
        .main-content {
            min-height: 100vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        /* 簡單的載入動畫 */
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="dashboard-body">
    <div class="background-effects">
        <div class="glow red-glow"></div>
        <div class="glow purple-glow"></div>
    </div>

    <nav class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-clock"></i>
            <h1>BOTC <span class="accent">Stats</span></h1>
        </div>
        <ul class="nav-links" id="main-nav">
            <li class="active">
                <a href="javascript:void(0)" data-page="dashboard">
                    <i class="fa-solid fa-chart-line"></i> 數據看板
                </a>
            </li>
            <li>
                <a href="javascript:void(0)" data-page="recorder">
                    <i class="fa-solid fa-book-open"></i> 覆盤紀錄
                </a>
            </li>
            <li>
                <a href="javascript:void(0)" data-page="record">
                    <i class="fa-solid fa-feather-pointed"></i> 錄入對局
                </a>
            </li>
            <li>
                <a href="javascript:void(0)" data-page="history">
                    <i class="fa-solid fa-clock-rotate-left"></i> 歷史紀錄
                </a>
            </li>
        </ul>
        <div class="nav-footer" style="display: flex; align-items: center; padding-top: 1rem; margin-top: auto;">
            <i class="fa-solid fa-music audio-control" id="bgm-toggle" title="開關氛圍音樂"></i>
        </div>
    </nav>
    <audio id="bgm-audio" src="audio/bgm.mp3" loop preload="auto"></audio>

    <main class="main-content" id="content-area">
        <div style="padding: 20px; color: var(--gold);">魔典讀取中...</div>
    </main>

    <script>
async function loadPage(pageName) {
    const area = document.getElementById('content-area');
    if (!area) return;

    area.style.opacity = '0.5';

    try {
        const response = await fetch(`/pages/${pageName}.html`, { cache: 'no-cache' });
        if (!response.ok) throw new Error(`找不到頁面: ${response.status}`);
        const html = await response.text();
        
        area.innerHTML = html;

        // 🟢 強制啟動子頁面腳本的核心邏輯
        const scripts = area.querySelectorAll('script');
        for (let oldScript of scripts) {
            const newScript = document.createElement('script');
            // 複製 type (如 text/babel), src (如 /js/recorder.js) 等所有屬性
            Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
            
            if (oldScript.src) {
                newScript.src = oldScript.src; // 外部 JS
            } else {
                newScript.appendChild(document.createTextNode(oldScript.innerHTML)); // 內嵌 JS
            }
            // 替換舊腳本以觸發執行
            oldScript.parentNode.replaceChild(newScript, oldScript);
        }

        area.style.opacity = '1';
        
        // 舊有邏輯初始化
        if (pageName === 'record' && typeof initRecord === 'function') initRecord();
        if (pageName === 'dashboard' && typeof initDashboard === 'function') initDashboard();

    } catch (err) {
        console.error("SPA 載入錯誤:", err);
        area.innerHTML = `<div style="color:red; padding:20px;">載入失敗: ${err.message}</div>`;
        area.style.opacity = '1';
    }
}
        // 監聽導覽列點擊
        document.querySelectorAll('#main-nav a').forEach(link => {
            link.addEventListener('click', function(e) {
                // 徹底阻止預設跳轉與 # 產生的 channel 關閉問題
                e.preventDefault();
                e.stopPropagation();

                const page = this.getAttribute('data-page');
                if (page) {
                    loadPage(page);
                    
                    // 切換 Active 樣式
                    document.querySelectorAll('#main-nav li').forEach(li => li.classList.remove('active'));
                    this.parentElement.classList.add('active');
                }
            });
        });

        // 頁面初次載入時，預設顯示數據看板
        window.onload = () => {
            loadPage('dashboard');
        };
    </script>
    <script src="/js/audio.js"></script>
</body>
</html>
