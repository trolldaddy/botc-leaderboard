<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>血染鐘樓：覆盤／紀錄／排行榜by 廚爹</title>

    <!-- 字體與圖示 -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="manifest" href="/manifest.json">
    
    <!-- 🟢 核心：Tailwind CSS (紀錄器必須要有這個才有樣式) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 🟢 核心數據庫 (必須在 record.js 之前載入) -->
    <script src="/js/roles_db.js"></script>

    <!-- 全域 API 配置 -->
    <script>
        let origin = window.location.origin;
        if (origin.endsWith('/')) origin = origin.slice(0, -1);
        window.API_BASE = origin;
        console.log("🚀 系統啟動，角色數據庫狀態:", window.MASTER_ROLE_DB ? "✅ 已載入" : "❌ 未載入");
    </script>

    <!-- React 運行環境 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
</head>
<body>
    <!-- (其餘內容保持不變) -->
    <div class="background-effects">
        <div class="glow red-glow"></div>
        <div class="glow purple-glow"></div>
    </div>

    <nav class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-clock"></i>
            <h1>拉普拉斯 <span class="accent">血染名人堂</span></h1>
        </div>
        
        <button class="hamburger-btn" id="mobile-menu-btn">
        <i class="fa-solid fa-bars"></i>
        </button>
        
        <ul class="nav-links" id="main-nav">
            <li class="active"><a href="#" data-page="dashboard"><i class="fa-solid fa-chart-line"></i> <span>數據看板</span></a></li>
            <li><a href="#" data-page="recorder"><i class="fa-solid fa-book-open"></i> <span>覆盤紀錄器</span></a></li>
            <li><a href="#" data-page="record"><i class="fa-solid fa-feather-pointed"></i> <span>錄入對局</span></a></li>
            <li><a href="#" data-page="history"><i class="fa-solid fa-clock-rotate-left"></i> <span>歷史紀錄＆戰績查詢</span></a></li>
        </ul>
    
    </nav>

    <main class="main-content" id="content-area">
        <div class="loading">正在召喚魔典...</div>
    </main>

    <script>
        // SPA 載入邏輯保持不變...
        async function loadPage(pageName) {
            const area = document.getElementById('content-area');
            if (!area) return;
            area.style.opacity = '0.5';
            try {
                const response = await fetch(`/pages/${pageName}.html?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error("頁面載入失敗");
                const html = await response.text();
                area.innerHTML = html;
                const scripts = area.querySelectorAll('script');
                for (let oldScript of scripts) {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    if (oldScript.src) {
                        newScript.src = oldScript.src + '?v=' + new Date().getTime();
                    } else {
                        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    }
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                }
                if (window.Babel) window.Babel.transformScriptTags();
                area.style.opacity = '1';
                document.querySelectorAll('#main-nav li').forEach(li => {
                    const link = li.querySelector('a');
                    if (link.getAttribute('data-page') === pageName) li.classList.add('active');
                    else li.classList.remove('active');
                });
            } catch (err) {
                area.innerHTML = `<div class="card"><h3>無法載入頁面</h3><p>${err.message}</p></div>`;
                area.style.opacity = '1';
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('#main-nav a').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const page = e.currentTarget.getAttribute('data-page');
                    loadPage(page);
                    window.location.hash = page;
                });
            });
/* 🟢 電腦版隱藏漢堡按鈕 */

.hamburger-btn {
    display: none !important;
}
        
/* 🟢 手機版 (767px 以下) */
@media (max-width: 767px) {
    /* 修正頂部列佈局：讓標題靠左，漢堡靠右 */
    .sidebar {
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        padding: 0.5rem 1rem !important;
        width: 100% !important;
        position: fixed !important;
        top: 0;
        left: 0;
        z-index: 1000;
        background: var(--bg-card); /* 確保背景色一致 */
    }

    /* 🔴 找回按鈕：強制顯示並設定醒目顏色 */
    .hamburger-btn {
        display: block !important;
        background: transparent;
        border: none;
        color: var(--accent-gold) !important; /* 改用金邊色確保看得到 */
        font-size: 1.5rem !important;
        cursor: pointer;
        z-index: 10001;
        outline: none;
    }

    /* 🟢 書籤式選單設計 (寬度約 30%) */
    .nav-links {
        position: fixed !important;
        right: -35% !important; /* 預設完全藏在右邊 */
        top: 0;
        width: 30% !important;   /* 書籤寬度 */
        height: 100vh;
        background: rgba(30, 30, 35, 0.98) !important;
        display: flex !important;
        flex-direction: column;
        padding: 80px 0.2rem 1rem 0.2rem !important;
        z-index: 9999 !important;
        transition: right 0.3s ease;
        border-left: 2px solid var(--accent-purple); /* 書籤邊緣飾條 */
        box-shadow: -5px 0 15px rgba(0,0,0,0.5);
    }

    .nav-links.active {
        right: 0 !important;
    }

    /* 書籤內的連結：隱藏文字，只留圖示與小標籤 */
    .nav-links li a span {
        font-size: 10px !important;
        display: block !important;
        text-align: center;
    }
}

            
    </script>
</body>
</html>
