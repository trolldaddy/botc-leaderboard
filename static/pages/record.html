<header class="top-header">
    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <h2 style="font-family: 'Cinzel', serif; letter-spacing: 2px;">覆盤魔法書 (RECORD MATCH)</h2>
        <button class="btn" style="background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1);" onclick="clearFullForm()">
            <i class="fa-solid fa-trash-can"></i> 清空表單
        </button>
    </div>
</header>

<datalist id="player-names-list"></datalist>

<div class="record-layout-wrapper">
    
    <!-- 左側邊欄：最近對局 -->
    <aside class="record-sidebar">
        <div class="card sidebar-card">
            <div class="card-header">
                <h3><i class="fa-solid fa-clock-rotate-left text-gold"></i> 最近錄入對局</h3>
            </div>
            <div id="recent-matches-list" class="sidebar-list">
                <div style="text-align: center; color: var(--text-muted); font-size: 0.8rem; padding: 2rem;">⏳ 正在翻閱魔典...</div>
            </div>
            <div style="margin-top: 1rem;">
                <button class="btn btn-ghost-full" onclick="if(window.loadPage) window.loadPage('history')">查看完整歷史紀錄</button>
            </div>
        </div>
        <div class="submit-footer-sidebar" style="margin-top: auto;">
        <div id="save-status" style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.8rem; text-align: center;">
            草稿已備份至本地
        </div>
        <button type="submit" form="record-form" id="submit-btn" class="btn btn-submit-glow w-full">
            <i class="fa-solid fa-cloud-arrow-up"></i> 確認並提交戰績
        </button>
    </div>
        
    </aside>

    <!-- 右側：錄入區域 -->
    <div class="record-main">
        <!-- 1. 快速導入卡片 -->
        <div class="card import-card" style="margin-bottom: 1.5rem;">
            <div class="card-header">
                <h3><i class="fa-solid fa-wand-magic-sparkles text-purple"></i> 快速導入 (從覆盤紀錄器)</h3>
                <span id="import-status" style="font-size: 0.8rem; color: var(--accent-gold);"></span>
            </div>
            <div style="margin-top: 1rem;">
                <textarea id="log-input" class="form-control dark-input" style="min-height: 100px;" placeholder="貼上覆盤文字紀錄..."></textarea>
                <div style="display: flex; gap: 0.8rem; margin-top: 1rem;">
                    <button class="btn btn-purple" onclick="autoFillFromLog()">
                        <i class="fa-solid fa-bolt"></i> 立即解析並填充
                    </button>
                    <label class="btn btn-outline">
                        <i class="fa-solid fa-file-import"></i> 匯入文字檔
                        <input type="file" hidden accept=".txt" onchange="importFile(this)">
                    </label>
                </div>
            </div>
        </div>

        <form id="record-form">
            <!-- 2. 基礎資訊卡片：三欄式排版 -->
            <div class="card" style="margin-bottom: 1.5rem;">
                <div class="card-header"><h3><i class="fa-solid fa-info-circle"></i> 對局基礎資訊</h3></div>
                
                <!-- 第一排：劇本、時間、地點 (改為下拉選單) -->
                <div class="form-grid-3" style="margin-top: 1.2rem;">
                    <div class="form-group">
                        <label>劇本名稱</label>
                        <input type="text" id="match-script" class="form-control dark-input" placeholder="例如：暗流湧動" required oninput="saveDraft()">
                    </div>
                    <div class="form-group">
                        <label>對局日期</label>
                        <input type="date" id="match-date" class="form-control dark-input" required oninput="saveDraft()">
                    </div>
                    <div class="form-group">
                        <label>遊戲地點</label>
                        <select id="match-location" class="form-control dark-input" oninput="saveDraft()">
                            <option value="拉普拉斯">拉普拉斯</option>
                            <option value="線上">線上</option>
                            <option value="台北">台北</option>
                            <option value="新北">新北</option>
                            <option value="桃園">桃園</option>
                            <option value="台中">台中</option>
                            <option value="台南">台南</option>
                            <option value="高雄">高雄</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                </div>

                <!-- 第二排：獲勝陣營、說書人、管理密碼 -->
                <div class="form-grid-3" style="margin-top: 1.2rem;">
                    <div class="form-group">
                        <label>獲勝陣營</label>
                        <select id="match-winner" class="form-control dark-input" oninput="saveDraft()">
                            <option value="good">善良陣營 Good</option>
                            <option value="evil">邪惡陣營 Evil</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>說書人</label>
                        <input type="text" id="match-storyteller" class="form-control dark-input" placeholder="說書人暱稱" oninput="saveDraft()">
                    </div>
                    <div class="form-group">
                        <label>管理員密碼</label>
                        <input type="password" id="admin-password" class="form-control dark-input" placeholder="••••" required>
                    </div>
                </div>
            </div>

            <!-- 3. 參與玩家卡片 -->
            <div class="card">
           <!---      <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h3><i class="fa-solid fa-users"></i> 參與玩家</h3>
                    <button type="button" class="btn btn-blue-sm" onclick="addPlayerRow()">
                        <i class="fa-solid fa-plus"></i> 添加玩家
                    </button>
                </div>
                <div class="table-responsive-container">
                    <table class="record-table">
                        <thead>
                            <tr>
                                <th>玩家暱稱</th>
                                <th>初始角色</th>
                                <th>最終角色</th>
                                <th>陣營</th>
                                <th>狀態</th>
                                <th style="width: 40px;"></th>
                            </tr>
                        </thead>
                        <tbody id="players-list"></tbody> 

                        <div id="players-list" class="space-y-2"></div>
                    </table>
                </div>--->
                <div class="mt-6">
    <div class="flex justify-between items-end mb-4">
        <h3 class="text-lg font-bold text-slate-200"><i class="fa-solid fa-users mr-2"></i>參與玩家</h3>
        <button type="button" class="text-sm text-yellow-500 hover:text-yellow-400 font-bold" onclick="addPlayerRow()">+ 添加玩家</button>
                </div>

            <div class="hidden sm:grid sm:grid-cols-12 gap-2 px-4 mb-2 text-xs font-bold text-slate-500">
                    <div class="sm:col-span-3">玩家暱稱</div>
                    <div class="sm:col-span-2">初始角色</div>
                    <div class="sm:col-span-2">最終角色</div>
                    <div class="sm:col-span-2">陣營</div>
                    <div class="sm:col-span-2">狀態</div>
                    <div class="sm:col-span-1 text-center">刪除</div>
                    </div>

                    <div id="players-list" class="space-y-3 sm:space-y-2">
                    </div>
            </div>
            </div>

           <!---   <div class="submit-footer">
                <div id="save-status" style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.8rem;">草稿已備份至本地</div>
                <button type="submit" id="submit-btn" class="btn btn-submit-glow">
                    <i class="fa-solid fa-cloud-arrow-up"></i> 確認並提交戰績
                </button>
            </div> --->
        </form>
    </div>
</div>

<style>
    .record-layout-wrapper { display: flex; gap: 2rem; width: 100%; box-sizing: border-box; }
    .record-sidebar { width: 320px; flex-shrink: 0; }
    .record-main { flex: 1; min-width: 0; }

    .form-grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.2rem;
        width: 100%;
    }

    .form-group label { display: block; font-size: 0.7rem; color: var(--accent-gold); margin-bottom: 0.4rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    
    .dark-input {
        background: rgba(0, 0, 0, 0.3) !important;
        border: 1px solid var(--border-color) !important;
        color: #fff !important;
        border-radius: 8px;
        padding: 0.8rem !important;
        width: 100%;
        box-sizing: border-box;
        font-size: 0.9rem;
    }

    .sidebar-list { display: flex; flex-direction: column; gap: 0.8rem; margin-top: 1rem; }
    .side-match-item {
        padding: 1rem;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        transition: all 0.3s ease;
    }
    .side-match-item:hover { background: rgba(255, 255, 255, 0.08); transform: translateX(5px); }
    .side-match-item .m-title { font-weight: 800; color: #fff; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .side-match-item .m-meta { font-size: 0.7rem; color: var(--text-muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    
    .m-tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-top: 4px; align-self: flex-start; }
    .tag-good { color: #a8dadc; background: rgba(69, 123, 157, 0.2); border: 1px solid rgba(69, 123, 157, 0.3); }
    .tag-evil { color: #ffb3b3; background: rgba(230, 57, 70, 0.2); border: 1px solid rgba(230, 57, 70, 0.3); }

    .record-table { width: 100%; min-width: 700px; border-collapse: separate; border-spacing: 0 5px; }
    .btn-submit-glow { padding: 1.2rem 4rem; border-radius: 50px; background: var(--accent-red); color: #fff; font-weight: bold; border: none; cursor: pointer; box-shadow: 0 10px 30px rgba(230, 57, 70, 0.3); }
    .btn-ghost-full { width: 100%; background: rgba(255,255,255,0.05); color: var(--text-muted); font-size: 0.75rem; border: 1px solid var(--border-color); }
    
    @media (max-width: 1023px) {
        .record-layout-wrapper { flex-direction: column; }
        .record-sidebar { width: 100%; }
        .form-grid-3 { grid-template-columns: 1fr; }
    }
}
  
    

</style>
<script src="/js/roles_db.js"></script>
<script src="/js/record.js"></script>
