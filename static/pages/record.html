<header class="top-header">
    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <h2>覆盤魔法書 (RECORD MATCH)</h2>
        <button class="btn btn-ghost" onclick="clearFullForm()">
            <i class="fa-solid fa-trash-can"></i> 清空
        </button>
    </div>
</header>

<datalist id="player-names-list"></datalist>

<div class="record-layout">
    <!-- 左側邊欄：詳細紀錄 -->
    <aside class="recent-sidebar">
        <div class="card sidebar-sticky">
            <div class="card-header">
                <h3><i class="fa-solid fa-clock-rotate-left text-gold"></i> 最近錄入紀錄</h3>
            </div>
            <div id="recent-matches-list" class="recent-matches-container">
                <div class="loading-placeholder">⏳ 讀取中...</div>
            </div>
            <button class="btn btn-full btn-outline" style="margin-top: 1rem;" onclick="if(window.loadPage) window.loadPage('history')">
                查看全部歷史
            </button>
        </div>
    </aside>

    <!-- 主錄入區域 -->
    <div class="main-record-area">
        <!-- 快速解析 -->
        <div class="card import-card">
            <div class="card-header">
                <h3><i class="fa-solid fa-wand-magic-sparkles text-purple"></i> 快速解析錄入</h3>
                <span id="import-status" class="status-label"></span>
            </div>
            <textarea id="log-input" class="form-control log-textarea" placeholder="貼上覆盤紀錄器文字..."></textarea>
            <div class="import-actions">
                <button class="btn btn-purple" onclick="autoFillFromLog()">
                    <i class="fa-solid fa-bolt"></i> 立即解析
                </button>
                <label class="btn btn-outline">
                    <i class="fa-solid fa-file-import"></i> 匯入檔案
                    <input type="file" hidden accept=".txt" onchange="importFile(this)">
                </label>
            </div>
        </div>

        <form id="record-form">
            <!-- 基礎資訊 -->
            <div class="card info-card">
                <div class="card-header"><h3><i class="fa-solid fa-info-circle"></i> 基礎資訊</h3></div>
                <div class="info-grid">
                    <div class="form-group"><label>劇本名稱</label><input type="text" id="match-script" class="form-control" required oninput="saveDraft()"></div>
                    <div class="form-group"><label>對局日期</label><input type="date" id="match-date" class="form-control" required oninput="saveDraft()"></div>
                    <div class="form-group"><label>遊戲地點</label><input type="text" id="match-location" class="form-control" placeholder="線上 / 拉普拉斯" oninput="saveDraft()"></div>
                    <div class="form-group"><label>獲勝陣營</label><select id="match-winner" class="form-control" oninput="saveDraft()"><option value="good">善良獲勝</option><option value="evil">邪惡獲勝</option></select></div>
                    <div class="form-group"><label>說書人</label><input type="text" id="match-storyteller" class="form-control" placeholder="前輩" oninput="saveDraft()"></div>
                    <div class="form-group"><label>管理員密鑰</label><input type="password" id="admin-password" class="form-control" placeholder="••••" required></div>
                </div>
            </div>

            <!-- 參與玩家 -->
            <div class="card players-card">
                <div class="card-header">
                    <h3><i class="fa-solid fa-users"></i> 參與玩家</h3>
                    <button type="button" class="btn btn-blue btn-sm" onclick="addPlayerRow()"><i class="fa-solid fa-plus"></i></button>
                </div>
                <!-- 核心修正：增加 overflow 容器 -->
                <div class="table-scroll-container">
                    <table class="history-table record-table">
                        <thead>
                            <tr>
                                <th style="width: 20%;">暱稱</th>
                                <th style="width: 20%;">初始角色</th>
                                <th style="width: 20%;">最終角色</th>
                                <th style="width: 15%;">陣營</th>
                                <th style="width: 15%;">狀態</th>
                                <th style="width: 10%;"></th>
                            </tr>
                        </thead>
                        <tbody id="players-list"></tbody>
                    </table>
                </div>
            </div>

            <div class="submit-section">
                <div id="save-status" class="draft-status">草稿備份中</div>
                <button type="submit" id="submit-btn" class="btn btn-submit">
                    <i class="fa-solid fa-cloud-arrow-up"></i> 確認並提交戰績
                </button>
            </div>
        </form>
    </div>
</div>

<style>
    /* --- 響應式佈局結構 --- */
    .record-layout {
        display: flex;
        gap: 1.5rem;
        width: 100%;
        box-sizing: border-box;
    }

    .recent-sidebar { width: 340px; flex-shrink: 0; }
    .main-record-area { flex: 1; min-width: 0; }

    @media (max-width: 1200px) {
        .recent-sidebar { width: 280px; }
    }

    @media (max-width: 992px) {
        .record-layout { flex-direction: column; }
        .recent-sidebar { width: 100%; order: 2; }
        .main-record-area { order: 1; }
        .sidebar-sticky { position: static !important; }
    }

    /* --- 表格滾動優化 (防止手機過寬) --- */
    .table-scroll-container {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        margin-top: 1rem;
        background: rgba(0,0,0,0.2);
        border-radius: 8px;
    }

    .record-table {
        min-width: 600px; /* 確保小螢幕也能正常顯示表格內容而不擠壓 */
        width: 100%;
    }

    /* --- 詳細側欄項目樣式 --- */
    .recent-matches-container { display: flex; flex-direction: column; gap: 0.8rem; margin-top: 1rem; }
    
    .match-item {
        padding: 1rem;
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        transition: transform 0.2s, background 0.2s;
    }
    .match-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.06); }

    .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
    .match-script-name { font-weight: bold; font-size: 0.95rem; color: #fff; }
    
    .match-tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
    .win-good { background: rgba(69, 123, 157, 0.2); color: #a8dadc; border: 1px solid rgba(69, 123, 157, 0.4); }
    .win-evil { background: rgba(230, 57, 70, 0.2); color: #ffb3b3; border: 1px solid rgba(230, 57, 70, 0.4); }

    .match-detail-row { display: flex; gap: 1rem; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.4rem; }
    .match-time-row { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-muted); border-top: 1px solid rgba(255,255,255,0.05); pt: 0.4rem; }

    /* --- 通用輸入框與按鈕優化 --- */
    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .form-control { 
        background: rgba(0,0,0,0.4) !important; 
        border: 1px solid var(--border-color) !important; 
        color: #fff !important;
        width: 100%;
        box-sizing: border-box;
    }
    .btn-full { width: 100%; justify-content: center; }
    .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); }
    .btn-blue { background: var(--accent-blue); color: #fff; }
    .btn-purple { background: var(--accent-purple); color: #fff; }
    .btn-submit { background: var(--accent-red); padding: 1rem 3rem; border-radius: 50px; font-size: 1.1rem; }
    .btn-delete { background: transparent; color: rgba(255,255,255,0.2); border: none; cursor: pointer; transition: color 0.2s; }
    .btn-delete:hover { color: var(--accent-red); }
    .btn-sm { padding: 4px 10px; font-size: 0.8rem; }
</style>
