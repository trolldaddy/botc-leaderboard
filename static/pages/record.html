<header class="top-header">
    <h2>覆盤魔法書 (RECORD MATCH)</h2>
</header>

<div class="record-container" style="max-width: 1300px; margin: 0 auto;">
    
    <!-- 智慧導入工具區 -->
    <div class="card mb-4" style="border: 1px dashed rgba(131, 56, 236, 0.3); background: rgba(131, 56, 236, 0.02); padding: 1rem;">
        <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
            <span style="font-size: 0.85rem; color: var(--text-muted);"><i class="fa-solid fa-wand-magic-sparkles text-purple"></i> 匯入覆盤紀錄：</span>
            <textarea id="log-input" class="form-control dark-input" rows="1" placeholder="在此貼上紀錄器產生的文字內容..." style="flex: 1; min-width: 200px; height: 38px; padding: 8px;"></textarea>
            <button type="button" class="btn btn-primary" onclick="autoFillFromLog()" style="padding: 0.5rem 1.2rem; font-size: 0.85rem;">
                <i class="fa-solid fa-bolt"></i> 立即解析
            </button>
            <label class="btn" style="background: var(--bg-card-hover); color: var(--text-main); padding: 0.5rem 1rem; font-size: 0.85rem; border: 1px solid var(--border-color); cursor: pointer;">
                <i class="fa-solid fa-file-arrow-up"></i> 上傳檔案
                <input type="file" accept=".txt" onchange="importFile(this)" style="display: none;">
            </label>
            <span id="import-status" style="font-size: 0.8rem; color: var(--accent-gold); font-weight: bold;"></span>
        </div>
    </div>

    <!-- 主表單區域 -->
    <form id="record-form">
        <div class="card" style="padding: 1.5rem 2rem;">
            
            <!-- 1. 基礎資訊區 -->
            <div class="section-base-info" style="margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 1.5rem;">
                <h3 class="mb-4" style="font-size: 1.1rem; color: var(--accent-gold);"><i class="fa-solid fa-scroll"></i> 對局資訊</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
                    <div class="form-group">
                        <label>劇本名稱</label>
                        <input type="text" id="match-script" class="form-control dark-input" placeholder="劇本...">
                    </div>
                    <div class="form-group">
                        <label>對局日期</label>
                        <input type="date" id="match-date" class="form-control dark-input">
                    </div>
                    <div class="form-group">
                        <label>遊戲地點</label>
                        <input type="text" id="match-location" class="form-control dark-input" placeholder="地點...">
                    </div>
                    <div class="form-group">
                        <label>說書人</label>
                        <input type="text" id="match-storyteller" class="form-control dark-input" placeholder="說書人...">
                    </div>
                    <div class="form-group">
                        <label>獲勝陣營</label>
                        <select id="match-winner" class="form-control dark-input">
                            <option value="good">正義陣營 (Good)</option>
                            <option value="evil">邪惡陣營 (Evil)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 2. 玩家陣容區 (寬度優化版) -->
            <div class="section-players">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h3 style="font-size: 1.1rem; color: var(--accent-blue);"><i class="fa-solid fa-users"></i> 參與玩家陣容</h3>
                    <button type="button" class="btn" style="background: var(--accent-red); color: white; padding: 0.5rem 1.2rem; font-size: 0.8rem;" onclick="addPlayerRow()">+ 添加玩家</button>
                </div>
                
                <div class="table-container">
                    <table class="data-table" id="players-table" style="width: 100%; border-spacing: 0 8px; border-collapse: separate;">
                        <thead>
                            <tr>
                                <th style="padding-left: 10px;">玩家暱稱</th>
                                <th>初始角色 (含隱藏)</th>
                                <th>最終角色</th>
                                <th>最終陣營</th>
                                <th>狀態</th>
                                <th width="60">操作</th>
                            </tr>
                        </thead>
                        <tbody id="players-list">
                            <!-- JS 動態生成 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div style="margin-top: 3rem; text-align: right;">
                <button type="submit" class="btn btn-primary" style="padding: 0.8rem 4rem; font-size: 1rem; border-radius: 50px; background: linear-gradient(135deg, var(--accent-red), #9d0208); box-shadow: 0 4px 15px rgba(230, 57, 70, 0.3);">
                    <i class="fa-solid fa-cloud-arrow-up"></i> 儲存戰績紀錄
                </button>
            </div>
        </div>
    </form>
</div>

<style>
    .dark-input {
        background: rgba(0, 0, 0, 0.4) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #fff !important;
        border-radius: 8px;
        padding: 10px 15px !important;
    }
    /* 表格欄位間距 */
    #players-list td {
        padding: 0 8px; /* 增加左右間距 */
    }
    #players-list .form-control {
        background: rgba(0,0,0,0.3);
        border: 1px solid rgba(255,255,255,0.05);
        height: 42px;
        border-radius: 6px;
    }
    .data-table th {
        color: var(--text-muted);
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 1px;
        padding-bottom: 10px;
    }
</style>

<script src="/js/record.js"></script>
