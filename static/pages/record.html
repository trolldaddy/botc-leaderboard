<header class="top-header">
    <h2>錄入對局紀錄 (RECORD MATCH)</h2>
</header>

<div class="dashboard-grid" style="display: grid; grid-template-columns: 1fr; gap: 1.5rem;">
    <!-- 匯入區域 -->
    <div class="card" style="border: 1px dashed var(--accent-purple); background: rgba(131, 56, 236, 0.05);">
        <h3 class="mb-3"><i class="fa-solid fa-file-import text-purple"></i> 快速匯入</h3>
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem;">
            將「覆盤紀錄器」產生的文字內容貼在下方，或直接上傳 .txt 檔案。
        </p>
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <textarea id="log-input" class="form-control" rows="5" placeholder="請在此處貼上紀錄文字..."></textarea>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <button type="button" class="btn btn-primary" onclick="autoFillFromLog()">
                    <i class="fa-solid fa-magic-wand-sparkles"></i> 立即解析
                </button>
                <label class="btn" style="background: var(--bg-card-hover); color: var(--text-main); border: 1px solid var(--border-color);">
                    <i class="fa-solid fa-upload"></i> 上傳檔案
                    <input type="file" accept=".txt" onchange="importFile(this)" style="display: none;">
                </label>
                <span id="import-status" style="font-size: 0.8rem; color: var(--accent-gold);"></span>
            </div>
        </div>
    </div>

    <!-- 錄入表單 -->
    <form id="record-form">
        <div class="dashboard-grid" style="display: grid; grid-template-columns: 1fr 2fr; gap: 1.5rem;">
            <!-- 左側：基礎資訊 -->
            <div class="card">
                <h3 class="mb-4"><i class="fa-solid fa-scroll text-gold"></i> 基礎資訊</h3>
                
                <div class="form-group">
                    <label>劇本名稱 (Script)</label>
                    <input type="text" id="match-script" class="form-control" placeholder="例如：初出茅廬">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>對局日期</label>
                        <input type="date" id="match-date" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>遊戲地點</label>
                        <input type="text" id="match-location" class="form-control" placeholder="地點...">
                    </div>
                </div>

                <div class="form-group">
                    <label>說書人 (Storyteller)</label>
                    <input type="text" id="match-storyteller" class="form-control" placeholder="輸入說書人名稱">
                </div>

                <div class="form-group">
                    <label>獲勝陣營</label>
                    <select id="match-winner" class="form-control">
                        <option value="good">正義陣營 (Good)</option>
                        <option value="evil">邪惡陣營 (Evil)</option>
                    </select>
                </div>
            </div>

            <!-- 右側：玩家與角色 -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h3><i class="fa-solid fa-users text-blue"></i> 玩家陣容</h3>
                    <button type="button" class="btn" style="background: var(--accent-blue); color: white;" onclick="addPlayerRow()">+ 添加玩家</button>
                </div>
                
                <div class="table-container">
                    <table class="data-table" id="players-table">
                        <thead>
                            <tr>
                                <th width="20%">玩家暱稱</th>
                                <th width="20%">初始角色</th>
                                <th width="20%">實際/隱藏角色</th>
                                <th width="15%">陣營</th>
                                <th width="15%">存活狀態</th>
                                <th width="10%">操作</th>
                            </tr>
                        </thead>
                        <tbody id="players-list">
                            <!-- JS 動態生成 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div style="margin-top: 2rem; text-align: right;">
            <button type="submit" class="btn btn-primary" style="padding: 1rem 3rem; font-size: 1.1rem;">
                <i class="fa-solid fa-cloud-arrow-up"></i> 保存對局戰績
            </button>
        </div>
    </form>
</div>

<!-- 載入邏輯 -->
<script src="/js/record.js"></script>
