<header class="top-header">
    <h2>覆盤魔法書 (RECORD MATCH)</h2>
</header>

<div class="record-container" style="max-width: 1400px; margin: 0 auto; padding-bottom: 50px;">
    
    <!-- 智慧導入工具區 -->
    <div class="card mb-4" style="border: 1px dashed rgba(131, 56, 236, 0.3); background: rgba(131, 56, 236, 0.02); padding: 1rem;">
        <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
            <span style="font-size: 0.85rem; color: var(--text-muted);"><i class="fa-solid fa-wand-magic-sparkles text-purple"></i> 匯入覆盤文字：</span>
            <textarea id="log-input" class="form-control dark-input" rows="1" placeholder="在此貼上紀錄器文字..." style="flex: 1; min-width: 200px; height: 42px; padding: 8px;"></textarea>
            
            <button type="button" class="btn btn-primary" onclick="autoFillFromLog()" style="padding: 0.5rem 1.2rem; font-size: 0.85rem;">
                <i class="fa-solid fa-bolt"></i> 立即解析
            </button>
            
            <label class="btn" style="background: var(--bg-card-hover); color: var(--text-main); padding: 0.5rem 1rem; font-size: 0.85rem; border: 1px solid var(--border-color); cursor: pointer;">
                <i class="fa-solid fa-file-arrow-up"></i> 上傳檔案
                <input type="file" accept=".txt" onchange="importFile(this)" style="display: none;">
            </label>

            <button type="button" class="btn" style="background: rgba(255,255,255,0.05); color: #ff4d4d; border: 1px solid rgba(255,77,77,0.2); font-size: 0.85rem;" onclick="clearFullForm()">
                <i class="fa-solid fa-trash-can"></i> 清空
            </button>
            
            <span id="import-status" style="font-size: 0.8rem; color: var(--accent-gold); font-weight: bold;"></span>
        </div>
    </div>

    <form id="record-form">
        <div class="card" style="padding: 2rem;">
            <!-- 基礎資訊 -->
            <div class="section-base-info" style="margin-bottom: 2.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2rem;">
                <h3 class="mb-4" style="font-size: 1.1rem; color: var(--accent-gold);"><i class="fa-solid fa-scroll"></i> 對局基礎資訊</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
                    <div class="form-group">
                        <label>使用劇本</label>
                        <input type="text" id="match-script" class="form-control dark-input" placeholder="劇本名稱..." required oninput="saveDraft()">
                    </div>
                    <div class="form-group">
                        <label>對局日期</label>
                        <input type="date" id="match-date" class="form-control dark-input" required oninput="saveDraft()">
                    </div>
                    <div class="form-group">
                        <label>遊戲地點</label>
                        <input type="text" id="match-location" class="form-control dark-input" placeholder="桃園、線上..." oninput="saveDraft()">
                    </div>
                    <div class="form-group">
                        <label>說書人</label>
                        <input type="text" id="match-storyteller" class="form-control dark-input" placeholder="說書人姓名..." required oninput="saveDraft()">
                    </div>
                    <div class="form-group">
                        <label>獲勝陣營</label>
                        <select id="match-winner" class="form-control dark-input" oninput="saveDraft()">
                            <option value="good">正義陣營 Good</option>
                            <option value="evil">邪惡陣營 Evil</option>
                        </select>
                    </div>
                    <!-- 原始邏輯需要的密鑰欄位 -->
                    <div class="form-group">
                        <label>管理員密鑰 (Password)</label>
                        <input type="password" id="admin-password" class="form-control dark-input" style="border-color: rgba(230, 57, 70, 0.3) !important;" placeholder="輸入保存密碼..." required>
                    </div>
                </div>
            </div>

            <!-- 玩家列表 -->
            <div class="section-players">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h3 style="font-size: 1.1rem; color: var(--accent-blue);"><i class="fa-solid fa-users"></i> 參與玩家陣容</h3>
                    <button type="button" class="btn" style="background: var(--accent-blue); color: white; padding: 0.5rem 1.2rem; font-size: 0.8rem;" onclick="addPlayerRow()">+ 添加玩家</button>
                </div>
                
                <div class="table-container">
                    <table class="data-table" id="players-table" style="width: 100%; border-spacing: 12px 8px; border-collapse: separate; margin-left: -12px;">
                        <thead>
                            <tr style="text-align: left;">
                                <th width="20%">玩家暱稱</th>
                                <th width="22%">初始角色 (含隱藏)</th>
                                <th width="22%">最終角色</th>
                                <th width="18%">最終陣營</th>
                                <th width="15%">狀態</th>
                                <th width="50"></th>
                            </tr>
                        </thead>
                        <tbody id="players-list">
                            <!-- JS 生成 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div style="margin-top: 3rem; text-align: right; display: flex; justify-content: flex-end; align-items: center; gap: 1.5rem;">
                <span id="save-status" style="font-size: 0.8rem; color: var(--text-muted); font-style: italic;">已自動存為草稿</span>
                <button type="submit" id="submit-btn" class="btn btn-primary" style="padding: 1rem 5rem; font-size: 1.1rem; border-radius: 50px; background: linear-gradient(135deg, var(--accent-red), #9d0208); box-shadow: 0 4px 20px rgba(230, 57, 70, 0.4);">
                    <i class="fa-solid fa-cloud-arrow-up"></i> 確認並提交戰績
                </button>
            </div>
        </div>
    </form>
</div>

<style>
    .dark-input {
        background: rgba(0, 0, 0, 0.4) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #fff !important;
        border-radius: 10px;
        padding: 12px 18px !important;
    }
    .dark-input:focus { border-color: var(--accent-purple) !important; background: rgba(0, 0, 0, 0.6) !important; outline: none; }
    #players-list td { padding: 0; }
    #players-list .form-control { height: 46px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; }
    .data-table th { color: var(--text-muted); font-size: 0.8rem; letter-spacing: 1px; padding-left: 12px; }
</style>

<script src="/js/record.js"></script>
