<header class="top-header">
    <h2>覆盤魔法書 (RECORD MATCH)</h2>
</header>

<div class="card mb-4" style="border: 1px dashed #6c5ce7; background: rgba(108, 92, 231, 0.05); margin-bottom: 2rem; padding: 20px; border-radius: 8px;">
    <h3 class="mb-3"><i class="fa-solid fa-wand-magic-sparkles text-gold"></i> 智慧導錄 (從紀錄器貼上)</h3>
    <p style="font-size: 0.9rem; color: #aaa; margin-bottom: 1rem;">將「血染紀錄器」的覆盤文字貼在下方，系統將自動生成玩家列表並填寫角色。</p>
    <textarea id="log-input" class="form-control" placeholder="請在此處貼上紀錄檔內容..." rows="4" style="width: 100%; background: rgba(0,0,0,0.2); color: white; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 1rem; padding: 10px;"></textarea>
    <button type="button" class="btn btn-primary" onclick="autoFillFromLog()">
        <i class="fa-solid fa-bolt"></i> 立即解析並自動填表
    </button>
</div>

<div class="card">
    <form id="record-form">
        <div class="dashboard-grid" style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem;">
            <div>
                <h3 class="mb-4"><i class="fa-solid fa-scroll text-gold"></i> 對局資訊</h3>
                <div class="form-group">
                    <label>使用劇本 (Script)</label>
                    <select id="match-script" class="form-control">
                        <option>暗流湧動 (Trouble Brewing)</option>
                        <option>黯月初升 (Bad Moon Rising)</option>
                        <option>夢殞春宵 (Sects & Violets)</option>
                        <option>自定義 (Custom)</option>
                    </select>
                </div>
                </div>

            <div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3><i class="fa-solid fa-users text-purple"></i> 參與玩家</h3>
                    <button type="button" class="btn btn-primary" onclick="addPlayerRow()">+ 添加玩家</button>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>玩家暱稱</th>
                                <th>初始角色</th>
                                <th>初始陣營</th>
                                <th>最終角色</th>
                                <th>最終陣營</th>
                                <th>狀態</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="players-list">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div style="text-align: right; margin-top: 20px;">
            <button type="submit" class="btn btn-primary btn-large">保存紀錄</button>
        </div>
    </form>
</div>

<script src="/js/record.js"></script>
