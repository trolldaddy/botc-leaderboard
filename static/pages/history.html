        <header class="top-header">
            <h2>對局紀錄 (Match History)</h2>
        </header>

        <div class="card col-span-2">
            <div class="card-header">
                <h3><i class="fa-solid fa-book-journal-whills text-blue"></i> 最近對局紀錄</h3>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>對局日期</th>
                            <th>使用劇本</th>
                            <th>說書人</th>
                            <th>獲勝陣營</th>
                            <th>遊玩人數</th>
                            <th>危險操作</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        <tr>
                            <td colspan="6" class="loading">正在追溯時空長河...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- 删除密码确认弹窗 (非常简易的暗黑风) -->
    <div id="delete-modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div class="card"
            style="width: 400px; padding: 2rem; position: relative; border-color: var(--accent-red); box-shadow: 0 0 20px rgba(230,57,70,0.5);">
            <h3 class="text-red" style="margin-bottom: 1rem;"><i class="fa-solid fa-triangle-exclamation"></i> 銷毀此條記錄嗎？
            </h3>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">此操作將永久抹除對局數據，並重新計算排行榜勝率，不可撤銷。
            </p>
            <input type="password" id="delete-pw" class="form-control" placeholder="请输入管理员钥匙 (如 botc)"
                style="margin-bottom: 1.5rem;">
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button class="btn" style="background: rgba(255,255,255,0.1); color: white;"
                    onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmDelete()">無情銷毀</button>
            </div>
        </div>
    </div>

    <script src="js/audio.js"></script>
    <script src="js/history.js"></script>
</body>

</html>
