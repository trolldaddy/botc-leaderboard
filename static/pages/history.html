<header class="top-header">
    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; flex-wrap: wrap; gap: 1rem;">
        <h2 style="font-family: 'Cinzel', serif; letter-spacing: 2px;">歷史魔典 (MATCH HISTORY)</h2>
        
        <!-- 全域搜尋欄 -->
        <div class="search-input-wrapper" style="width: 350px; max-width: 100%;">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="history-search" placeholder="搜尋玩家、說書人、地點或劇本..." oninput="handleSearch()">
        </div>
    </div>
</header>

<div class="history-container">
    
    <!-- 動態統計看板 -->
    <div class="card summary-card">
        <div class="summary-header">
            <div style="flex: 1; min-width: 200px;">
                <h4 id="summary-title" style="color: var(--accent-gold); font-size: 1.1rem; margin-bottom: 0.5rem;">總對局紀錄回顧</h4>
                <p id="search-hint" style="font-size: 0.75rem; color: var(--text-muted); margin: 0;">顯示所有魔典中記載的對局</p>
            </div>
            
            <!-- 身份切換 Tabs -->
            <div id="filter-tabs-container" class="filter-tabs" style="display: none;">
                <button class="tab-btn active" data-type="all" onclick="setFilterType('all')">全部</button>
                <button class="tab-btn" data-type="player" onclick="setFilterType('player')">作為玩家</button>
                <button class="tab-btn" data-type="storyteller" onclick="setFilterType('storyteller')">作為說書人</button>
                <button class="tab-btn" data-type="location" onclick="setFilterType('location')">作為地點</button>
                <button class="tab-btn" data-type="script" onclick="setFilterType('script')">作為劇本</button>
            </div>
        </div>

        <div class="summary-stats-grid">
            <div class="stat-box">
                <span class="stat-label">總參戰</span>
                <span class="stat-value text-purple" id="stat-total">-</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">善良勝率</span>
                <span class="stat-value text-blue" id="stat-good-rate">-%</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">邪惡勝率</span>
                <span class="stat-value text-red" id="stat-evil-rate">-%</span>
            </div>
            <div class="stat-box hidden-mobile">
                <span class="stat-label">常駐地點</span>
                <span class="stat-value-small" id="stat-top-location">-</span>
            </div>
            <div class="stat-box hidden-mobile">
                <span class="stat-label">鍾情角色</span>
                <span class="stat-value-small" id="stat-top-role">-</span>
            </div>
        </div>
    </div>

    <!-- 歷史清單容器 -->
    <div id="history-list-area" style="width: 100%; display: flex; flex-direction: column; gap: 1rem;">
        <!-- JS 渲染 -->
    </div>
</div>

<style>
    /* 基礎容器與搜尋 */
    .history-container { max-width: 1500px; margin: 0 auto; padding: 0 1rem 80px 1rem; box-sizing: border-box; width: 100%; }
    .search-input-wrapper { position: relative; }
    .search-input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-input-wrapper input {
        width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border-color);
        color: #fff; padding: 0.8rem 1rem 0.8rem 2.8rem; border-radius: 50px; outline: none; transition: all 0.3s;
    }

    .filter-tabs { display: flex; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 12px; border: 1px solid var(--border-color); flex-wrap: wrap; gap: 2px; }
    .tab-btn {
        background: transparent; border: none; color: var(--text-muted); padding: 6px 12px; border-radius: 8px;
        font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: var(--accent-purple); color: #fff; }

    .summary-stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
    .stat-label { display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 5px; font-weight: bold; }
    .stat-value { font-size: 1.8rem; font-weight: 800; font-family: 'Inter', sans-serif; }
    .stat-value-small { font-size: 0.9rem; font-weight: 700; color: var(--accent-gold); display: block; margin-top: 5px; }

    /* 🟢 歷史紀錄卡片 - 強化寬度鎖定 */
    .match-history-card { 
        background: rgba(30, 30, 35, 0.5); 
        border: 1px solid var(--border-color); 
        border-radius: 16px; 
        width: 100%; 
        max-width: 100%;
        overflow: hidden; 
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
    }

    .match-main-row { 
        padding: 1.2rem; 
        display: flex; 
        align-items: center; 
        cursor: pointer; 
        gap: 1.2rem; 
        width: 100%;
        box-sizing: border-box;
    }

    .match-date-box { 
        width: 70px; text-align: center; background: rgba(0,0,0,0.3); padding: 10px 5px; 
        border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; 
    }
    .year-label { font-size: 0.6rem; color: var(--text-muted); display: block; opacity: 0.6; }
    .date-label { font-size: 1.1rem; font-weight: 800; color: var(--accent-gold); }

    .match-info-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0.6rem; }
    
    .info-row-top { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .match-title { margin: 0; font-size: 1.2rem; color: #fff; font-weight: 800; }
    .meta-tags { display: flex; gap: 0.8rem; font-size: 0.8rem; color: var(--text-muted); flex-wrap: wrap; }

    /* 🟢 玩家預覽行 - 修改為完整顯示不縮略 */
    .info-row-bottom { display: flex; align-items: flex-start; gap: 8px; margin-top: 2px; }
    .player-preview-text { 
        font-size: 0.8rem; 
        color: rgba(255,255,255,0.45); 
        line-height: 1.5;
        word-break: break-all; /* 確保長名字會換行 */
        white-space: normal;  /* 允許換行 */
    }

    .match-result-badge { 
        padding: 8px 18px; border-radius: 10px; font-weight: 900; font-size: 0.95rem; 
        text-align: center; min-width: 120px; flex-shrink: 0; 
    }
    .res-good { background: rgba(69, 123, 157, 0.25); color: #a8dadc; border: 1px solid rgba(69, 123, 157, 0.4); }
    .res-evil { background: rgba(230, 57, 70, 0.25); color: #ffb3b3; border: 1px solid rgba(230, 57, 70, 0.4); }

    .toggle-icon { transition: transform 0.3s; color: var(--text-muted); flex-shrink: 0; }
    .match-history-card.open .toggle-icon { transform: rotate(180deg); color: #fff; }

    /* 🟢 展開區詳情 - 嚴格橫向滾動 */
    .match-details-panel { 
        background: rgba(0, 0, 0, 0.4); 
        border-top: 1px solid var(--border-color); 
        display: none; 
        padding: 1rem; 
        width: 100%;
        box-sizing: border-box;
    }
    .horizontal-detail-bar { 
        width: 100%; 
        overflow-x: auto; 
        -webkit-overflow-scrolling: touch; 
        background: rgba(0, 0, 0, 0.2); 
        border-radius: 12px;
        padding: 4px;
        box-sizing: border-box;
    }
    .detail-table { 
        min-width: 750px; /* 確保內容寬度足夠觸發滾動而非擠壓 */
        width: 100%; 
        border-collapse: collapse; 
        font-size: 0.85rem; 
    }
    .detail-table th { text-align: left; color: var(--accent-gold); padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.75rem; }
    .detail-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #ddd; }

    @media (max-width: 850px) {
        .match-main-row { gap: 1rem; padding: 1rem; flex-wrap: wrap; }
        .match-info-content { width: calc(100% - 85px); }
        .match-result-badge { width: 100%; margin-top: 5px; order: 10; }
        .hidden-mobile { display: none; }
        .summary-stats-grid { grid-template-columns: repeat(3, 1fr); }
    }
</style>

<script src="/js/history.js"></script>
