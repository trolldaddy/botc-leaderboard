<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match History - BOTC</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="dashboard-body">
    <div class="background-effects">
        <div class="glow red-glow"></div>
        <div class="glow purple-glow"></div>
    </div>

    <nav class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-clock"></i>
            <h1>BOTC <span class="accent">Stats</span></h1>
        </div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fa-solid fa-chart-line"></i> 數據看板</a></li>
            <li><a href="record.html"><i class="fa-solid fa-feather-pointed"></i> 記錄對局</a></li>
            <li class="active"><a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i> 歷史紀錄</a></li>
        </ul>
        <div class="nav-footer" style="display: flex; align-items: center; padding-top: 1rem; margin-top: auto;">
            <i class="fa-solid fa-music audio-control" id="bgm-toggle" title="开关氛围音乐"></i>
        </div>
    </nav>
    <audio id="bgm-audio" src="audio/bgm.mp3" loop preload="auto"></audio>

    <main class="main-content">
        <header class="top-header">
            <h2>對局紀錄 (Match History)</h2>
        </header>

        <div class="card col-span-2">
            <div class="card-header">
                <h3><i class="fa-solid fa-book-journal-whills text-blue"></i> 最近對局紀錄</h3>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>對局日期</th>
                            <th>使用劇本</th>
                            <th>說書人</th>
                            <th>獲勝陣營</th>
                            <th>遊玩人數</th>
                            <th>危險操作</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        <tr>
                            <td colspan="6" class="loading">正在追溯時空長河...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- 删除密码确认弹窗 (非常简易的暗黑风) -->
    <div id="delete-modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div class="card"
            style="width: 400px; padding: 2rem; position: relative; border-color: var(--accent-red); box-shadow: 0 0 20px rgba(230,57,70,0.5);">
            <h3 class="text-red" style="margin-bottom: 1rem;"><i class="fa-solid fa-triangle-exclamation"></i> 銷毀此條記錄嗎？
            </h3>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">此操作將永久抹除對局數據，並重新計算排行榜勝率，不可撤銷。
            </p>
            <input type="password" id="delete-pw" class="form-control" placeholder="请输入管理员钥匙 (如 botc)"
                style="margin-bottom: 1.5rem;">
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button class="btn" style="background: rgba(255,255,255,0.1); color: white;"
                    onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmDelete()">無情銷毀</button>
            </div>
        </div>
    </div>

    <script src="js/audio.js"></script>
    <script src="js/history.js"></script>
</body>

</html>
