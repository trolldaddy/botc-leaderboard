<header class="top-header">
    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; flex-wrap: wrap; gap: 1rem;">
        <h2 style="font-family: 'Cinzel', serif; letter-spacing: 2px;">歷史魔典 (MATCH HISTORY)</h2>
        
        <!-- 🟢 簡約搜尋欄：直接搜尋 -->
        <div class="search-input-wrapper" style="width: 350px; max-width: 100%;">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="history-search" placeholder="輸入玩家、說書人、地點或劇本..." oninput="handleSearch()">
        </div>
    </div>
</header>

<div class="history-container" style="max-width: 1400px; margin: 0 auto; padding: 0 1rem 80px 1rem;">
    
    <!-- 🟢 動態統計看板 -->
    <div class="card summary-card" style="margin-bottom: 2rem; border-top: 4px solid var(--accent-purple); padding: 1.5rem;">
        <div class="summary-header" style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem;">
            <div>
                <h4 id="summary-title" style="color: var(--accent-gold); font-size: 1.1rem; margin-bottom: 0.5rem;">總對局紀錄回顧</h4>
                <p id="search-hint" style="font-size: 0.75rem; color: var(--text-muted); margin: 0;">顯示所有魔典中記載的對局</p>
            </div>
            
            <!-- 🟢 搜尋後才出現的篩選 Tab -->
            <div id="filter-tabs-container" class="filter-tabs" style="display: none;">
                <button class="tab-btn active" onclick="setFilterType('all')">全部</button>
                <button class="tab-btn" onclick="setFilterType('player')">作為玩家</button>
                <button class="tab-btn" onclick="setFilterType('storyteller')">作為說書人</button>
                <button class="tab-btn" onclick="setFilterType('location')">作為地點</button>
                <button class="tab-btn" onclick="setFilterType('script')">作為劇本</button>
            </div>
        </div>

        <div class="summary-stats-grid" style="margin-top: 1.5rem;">
            <div class="stat-item">
                <span class="stat-label">對局場次</span>
                <span class="stat-value text-purple" id="stat-total">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">善良勝率</span>
                <span class="stat-value text-blue" id="stat-good-rate">-%</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">邪惡勝率</span>
                <span class="stat-value text-red" id="stat-evil-rate">-%</span>
            </div>
            <div class="stat-item hidden-mobile">
                <span class="stat-label">常駐地點</span>
                <span class="stat-value-small" id="stat-top-location">-</span>
            </div>
            <div class="stat-item hidden-mobile">
                <span class="stat-label">鍾情角色</span>
                <span class="stat-value-small" id="stat-top-role">-</span>
            </div>
        </div>
    </div>

    <!-- 歷史清單容器 -->
    <div id="history-list-area" class="history-list-wrapper">
        <!-- JS 渲染內容 -->
    </div>
</div>

<style>
    /* 搜尋框樣式 */
    .search-input-wrapper { position: relative; }
    .search-input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-input-wrapper input {
        width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border-color);
        color: #fff; padding: 0.8rem 1rem 0.8rem 2.8rem; border-radius: 50px; outline: none; transition: all 0.3s;
    }
    .search-input-wrapper input:focus { border-color: var(--accent-purple); box-shadow: 0 0 15px rgba(131, 56, 236, 0.2); }

    /* Tab 切換鈕樣式 */
    .filter-tabs { display: flex; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 12px; border: 1px solid var(--border-color); }
    .tab-btn {
        background: transparent; border: none; color: var(--text-muted); padding: 6px 14px; border-radius: 8px;
        font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: var(--accent-purple); color: #fff; }
    .tab-btn:hover:not(.active) { color: #fff; background: rgba(255,255,255,0.05); }

    /* 統計格點 */
    .summary-stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 1rem; }
    .stat-label { display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
    .stat-value { font-size: 1.8rem; font-weight: 800; font-family: 'Inter', sans-serif; }
    .stat-value-small { font-size: 0.95rem; font-weight: 700; color: var(--accent-gold); display: block; margin-top: 5px; }

    /* 對局卡片與橫向滾動詳情 */
    .match-history-card { background: rgba(30, 30, 35, 0.5); border: 1px solid var(--border-color); border-radius: 16px; margin-bottom: 1rem; overflow: hidden; }
    .match-main-row { padding: 1rem 1.2rem; display: flex; align-items: center; cursor: pointer; gap: 1rem; }
    
    .match-details-panel { background: rgba(0, 0, 0, 0.4); border-top: 1px solid var(--border-color); display: none; padding: 1rem; }
    .horizontal-detail-bar { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; background: rgba(0, 0, 0, 0.2); border-radius: 12px; }
    
    .detail-table { min-width: 750px; width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .detail-table th { text-align: left; color: var(--accent-gold); padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.7rem; }
    .detail-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

    .toggle-icon { transition: transform 0.3s; color: var(--text-muted); }
    .match-history-card.open .toggle-icon { transform: rotate(180deg); }

    @media (max-width: 768px) {
        .hidden-mobile { display: none; }
        .match-main-row { flex-wrap: wrap; }
        .filter-tabs { width: 100%; overflow-x: auto; }
        .tab-btn { flex: 1; white-space: nowrap; }
    }
</style>

<script src="/js/history.js"></script>
