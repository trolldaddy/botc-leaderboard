<header class="top-header">
    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; flex-wrap: wrap; gap: 1rem;">
        <h2 style="font-family: 'Cinzel', serif; letter-spacing: 2px;">歷史魔典 (MATCH HISTORY)</h2>
        
        <!-- 🟢 全域搜尋欄 -->
        <div class="search-input-wrapper" style="width: 350px; max-width: 100%;">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="history-search" placeholder="搜尋玩家、說書人、地點或劇本..." oninput="handleSearch()">
        </div>
    </div>
</header>

<div class="history-container" style="max-width: 100%; width: 1500px; margin: 0 auto; padding: 0 1rem 80px 1rem; box-sizing: border-box;">
    
    <!-- 🟢 動態統計看板 (自動變動標題) -->
    <div class="card summary-card" style="margin-bottom: 2rem; border-top: 4px solid var(--accent-purple); padding: 1.5rem;">
        <div class="summary-header" style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem;">
            <div style="flex: 1; min-width: 200px;">
                <h4 id="summary-title" style="color: var(--accent-gold); font-size: 1.1rem; margin-bottom: 0.5rem;">總對局紀錄回顧</h4>
                <p id="search-hint" style="font-size: 0.75rem; color: var(--text-muted); margin: 0;">顯示所有魔典中記載的對局</p>
            </div>
            
            <!-- 🟢 身份切換 Tabs -->
            <div id="filter-tabs-container" class="filter-tabs" style="display: none;">
                <button class="tab-btn active" data-type="all" onclick="setFilterType('all')">全部</button>
                <button class="tab-btn" data-type="player" onclick="setFilterType('player')">作為玩家</button>
                <button class="tab-btn" data-type="storyteller" onclick="setFilterType('storyteller')">作為說書人</button>
                <button class="tab-btn" data-type="location" onclick="setFilterType('location')">作為地點</button>
                <button class="tab-btn" data-type="script" onclick="setFilterType('script')">作為劇本</button>
            </div>
        </div>

        <div class="summary-stats-grid" style="margin-top: 1.5rem;">
            <div class="stat-box">
                <span class="stat-label">總場次</span>
                <span class="stat-value text-purple" id="stat-total">-</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">善良勝率</span>
                <span class="stat-value text-blue" id="stat-good-rate">-%</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">邪惡勝率</span>
                <span class="stat-value text-red" id="stat-evil-rate">-%</span>
            </div>
            <div class="stat-box hidden-mobile">
                <span class="stat-label">常出沒地點</span>
                <span class="stat-value-small" id="stat-top-location">-</span>
            </div>
            <div class="stat-box hidden-mobile">
                <span class="stat-label">最常角色</span>
                <span class="stat-value-small" id="stat-top-role">-</span>
            </div>
        </div>
    </div>

    <!-- 歷史清單容器 -->
    <div id="history-list-area" style="width: 100%;">
        <!-- JS 渲染 -->
    </div>
</div>

<style>
    /* 搜尋與佈局 */
    .search-input-wrapper { position: relative; }
    .search-input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-input-wrapper input {
        width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border-color);
        color: #fff; padding: 0.8rem 1rem 0.8rem 2.8rem; border-radius: 50px; outline: none; transition: all 0.3s;
    }

    .filter-tabs { display: flex; background: rgba(0,0,0,0.3); padding: 4px; border-radius: 12px; border: 1px solid var(--border-color); flex-wrap: wrap; }
    .tab-btn {
        background: transparent; border: none; color: var(--text-muted); padding: 6px 14px; border-radius: 8px;
        font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: var(--accent-purple); color: #fff; }

    /* 統計格點 */
    .summary-stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 1rem; }
    .stat-label { display: block; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 5px; font-weight: bold; }
    .stat-value { font-size: 2rem; font-weight: 800; }
    .stat-value-small { font-size: 0.9rem; font-weight: 700; color: var(--accent-gold); display: block; margin-top: 5px; }

    /* 🟢 核心修正：防止卡片被表格撐開 */
    .match-history-card { 
        background: rgba(30, 30, 35, 0.5); 
        border: 1px solid var(--border-color); 
        border-radius: 16px; 
        margin-bottom: 1.2rem; 
        width: 100%; 
        max-width: 100%;
        overflow: hidden; /* 強制切斷溢出 */
        box-sizing: border-box;
    }

    .match-main-row { 
        padding: 1rem 1.2rem; 
        display: flex; 
        align-items: center; 
        cursor: pointer; 
        gap: 1rem; 
        width: 100%;
        box-sizing: border-box;
    }

    .match-details-panel { 
        background: rgba(0, 0, 0, 0.4); 
        border-top: 1px solid var(--border-color); 
        display: none; 
        padding: 1rem; 
        width: 100%;
        box-sizing: border-box;
    }

    /* 🟢 橫向捲動 Detail Bar：只有這裡可以拉動 */
    .horizontal-detail-bar { 
        width: 100%; 
        overflow-x: auto; 
        -webkit-overflow-scrolling: touch; 
        background: rgba(0, 0, 0, 0.2); 
        border-radius: 12px;
        padding: 4px;
    }
    
    .detail-table { min-width: 700px; width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .detail-table th { text-align: left; color: var(--accent-gold); padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.7rem; }
    .detail-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #ccc; }

    .toggle-icon { transition: transform 0.3s; color: var(--text-muted); }
    .match-history-card.open .toggle-icon { transform: rotate(180deg); color: #fff; }

    /* 勝負標籤加大 */
    .res-good { background: rgba(69, 123, 157, 0.25); color: #a8dadc; border: 1px solid rgba(69, 123, 157, 0.5); padding: 8px 18px; border-radius: 10px; font-weight: 800; }
    .res-evil { background: rgba(230, 57, 70, 0.25); color: #ffb3b3; border: 1px solid rgba(230, 57, 70, 0.5); padding: 8px 18px; border-radius: 10px; font-weight: 800; }

    @media (max-width: 800px) {
        .hidden-mobile { display: none; }
        .match-main-row { flex-wrap: wrap; position: relative; }
        .match-result-tag { width: 100%; text-align: center; order: 3; }
        .filter-tabs { width: 100%; }
        .tab-btn { flex: 1; text-align: center; font-size: 0.75rem; padding: 6px 4px; }
    }
</style>

<script src="/js/history.js"></script>
