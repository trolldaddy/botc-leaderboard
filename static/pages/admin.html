<header class="top-header">
    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <h2 style="font-family: 'Cinzel', serif; letter-spacing: 2px;">管理後台 (ADMIN)</h2>
        <button class="btn" style="background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1);" onclick="refreshAdminPanel()">
            <i class="fa-solid fa-rotate"></i> 重新整理
        </button>
    </div>
</header>

<div class="admin-layout">
    <section class="card admin-card">
        <div class="card-header">
            <h3><i class="fa-solid fa-users-gear text-gold"></i> LINE 登入帳號</h3>
        </div>
        <div id="admin-users-area" class="admin-list-status">正在讀取帳號...</div>
    </section>

    <section class="card admin-card admin-replay-card">
        <div class="card-header">
            <h3><i class="fa-solid fa-scroll text-gold"></i> Replay 紀錄管理</h3>
        </div>
        <div id="admin-replays-area" class="admin-list-status">正在讀取 Replay...</div>
    </section>
</div>

<style>
    .admin-layout {
        display: grid;
        grid-template-columns: minmax(320px, 0.8fr) minmax(620px, 1.6fr);
        gap: 1.5rem;
        height: calc(100vh - 220px);
        min-height: 520px;
        overflow: hidden;
    }

    .admin-card {
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .admin-card > .card-header { flex: 0 0 auto; }

    .admin-list-status {
        color: var(--text-muted);
        padding: 1rem 0;
    }

    #admin-users-area,
    #admin-replays-area {
        min-height: 0;
        overflow: hidden;
    }

    .admin-user-list,
    .admin-replay-list {
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        overflow-y: auto;
        padding-right: 0.4rem;
        min-height: 0;
        height: 100%;
    }

    .admin-user-item,
    .admin-replay-item {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 10px;
        padding: 1rem;
        max-width: 100%;
        overflow: hidden;
    }

    .admin-replay-item.is-expanded {
        background: rgba(255,255,255,0.055);
        border-color: rgba(255,183,3,0.18);
    }

    .admin-user-top,
    .admin-replay-top {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        align-items: center;
        min-width: 0;
    }

    .admin-replay-summary {
        appearance: none;
        border: 0;
        background: transparent;
        padding: 0;
        margin: 0;
        color: inherit;
        text-align: left;
        min-width: 0;
        flex: 1 1 auto;
        cursor: pointer;
    }

    .admin-replay-summary:hover .admin-title { color: var(--accent-gold); }

    .admin-title {
        font-weight: 800;
        color: #fff;
        margin-bottom: 0.3rem;
    }

    .admin-meta {
        color: var(--text-muted);
        font-size: 0.78rem;
        line-height: 1.6;
        overflow-wrap: anywhere;
    }

    .admin-actions {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        justify-content: flex-end;
        flex: 0 0 auto;
    }

    .admin-replay-details {
        display: none;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid rgba(255,255,255,0.08);
    }

    .admin-replay-item.is-expanded .admin-replay-details { display: block; }

    .admin-detail-actions {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 0.8rem;
    }

    .admin-chip-row {
        margin-top: 0.5rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
    }

    .admin-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.72rem;
        padding: 0.18rem 0.5rem;
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
        color: var(--text-muted);
    }

    .admin-chip.good { color: #cfe9ff; background: rgba(69,123,157,0.22); }
    .admin-chip.danger { color: #ffd0d4; background: rgba(230,57,70,0.22); }
    .admin-chip.gold { color: var(--accent-gold); background: rgba(255,183,3,0.12); }

    .admin-edit-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.8rem;
    }

    .admin-edit-grid .wide { grid-column: span 2; }

    .admin-edit-grid label,
    .admin-section-title {
        display: block;
        font-size: 0.68rem;
        color: var(--accent-gold);
        margin-bottom: 0.35rem;
        font-weight: 700;
    }

    .admin-section-title {
        margin-top: 1rem;
        text-transform: none;
        letter-spacing: 0;
    }

    .admin-player-table-wrap {
        width: 100%;
        overflow-x: auto;
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 8px;
        background: rgba(0,0,0,0.18);
    }

    .admin-player-table {
        width: 100%;
        min-width: 760px;
        border-collapse: collapse;
    }

    .admin-player-table th,
    .admin-player-table td {
        padding: 0.35rem;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        vertical-align: middle;
    }

    .admin-player-table th {
        color: var(--text-muted);
        font-size: 0.72rem;
        text-align: left;
        font-weight: 700;
    }

    .admin-player-table td:first-child { width: 72px; }

    .admin-player-table .dark-input,
    .admin-edit-grid .dark-input,
    .admin-replay-log {
        width: 100%;
        min-width: 0;
        box-sizing: border-box;
    }

    .admin-icon-btn,
    .admin-add-player {
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.04);
        color: var(--text-muted);
        border-radius: 7px;
        padding: 0.45rem 0.6rem;
        cursor: pointer;
    }

    .admin-icon-btn:hover,
    .admin-add-player:hover {
        color: #fff;
        border-color: rgba(255,255,255,0.22);
    }

    .admin-add-player {
        margin-top: 0.55rem;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        width: fit-content;
    }

    .admin-replay-log {
        min-height: 120px;
        max-height: 260px;
        resize: vertical;
    }

    @media (max-width: 1200px) {
        .admin-layout { grid-template-columns: 1fr; height: auto; overflow: visible; }
        .admin-card { max-height: none; }
        .admin-user-list, .admin-replay-list { max-height: 70vh; }
    }

    @media (max-width: 760px) {
        .admin-edit-grid { grid-template-columns: 1fr; }
        .admin-edit-grid .wide { grid-column: auto; }
        .admin-user-top, .admin-replay-top { flex-direction: column; align-items: flex-start; }
        .admin-actions { justify-content: flex-start; }
    }
</style>

<script src="/js/admin.js"></script>
