<div class="replay-master-container">
    <header class="replay-magic-header">
        <div class="title-wrapper">
            <h2 id="replay-title" class="cinzel-font">正在召喚魔典...</h2>
            <div class="decorative-line">
                <span class="dot"></span>
                <span class="line"></span>
                <span class="dot"></span>
            </div>
            <p class="subtitle">拉普拉斯 · 血染魔典正式卷宗</p>
        </div>
        <button class="btn-return-magic" onclick="loadPage('history')">
            <i class="fa-solid fa-book-bookmark"></i> 返回歷史紀錄
        </button>
    </header>

    <div class="replay-scroll-paper">
        <pre id="replay-content" class="botc-classic-log"></pre>
    </div>
</div>

<script>
    // 🟢 核心修正：加入讀取邏輯
    (function() {
        // 從 sessionStorage 抓取由 history.js 存入的資料
        const rawData = sessionStorage.getItem('current_replay_data');
        
        if (!rawData) {
            document.getElementById('replay-title').innerText = "找不到魔典紀錄";
            document.getElementById('replay-content').innerText = "請嘗試從歷史紀錄頁面重新點擊「查閱覆盤」。";
            return;
        }

        try {
            const data = JSON.parse(rawData);
            
            // 渲染標題與內容
            if (data.title) {
                document.getElementById('replay-title').innerText = data.title;
            }
            if (data.content) {
                document.getElementById('replay-content').innerText = data.content;
            }
        } catch (e) {
            console.error("解析紀錄資料失敗:", e);
            document.getElementById('replay-title').innerText = "紀錄格式錯誤";
        }
    })();
</script>
