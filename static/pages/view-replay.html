<div class="view-replay-container">
    <div class="replay-header">
        <div class="title-group">
            <h2 id="replay-title" style="font-family: 'Cinzel', serif; color: var(--accent-gold);">載入中...</h2>
            <p style="font-size: 0.8rem; color: var(--text-muted);">正在閱讀拉普拉斯魔典紀錄</p>
        </div>
        <button class="btn btn-outline" onclick="loadPage('history')">
            <i class="fa-solid fa-rotate-left"></i> 返回歷史
        </button>
    </div>

    <div class="replay-paper">
        <pre id="replay-content" class="botc-log-style"></pre>
    </div>
</div>

<script>
    {
        const data = JSON.parse(sessionStorage.getItem('current_replay_data') || '{}');
        if (data.content) {
            document.getElementById('replay-title').innerText = data.title;
            document.getElementById('replay-content').innerText = data.content;
        }
    }
</script>

<style>
    /* 1. 整個容器：處理頂部被 Sidebar 擋住與底部被工作列擋住的問題 */
    .view-replay-container {
        padding: 0 1rem; /* 左右保留呼吸空間 */
        max-width: 1000px;
        margin: 0 auto;
        
        /* 🔴 關鍵修正：預留頂部 Sidebar 的 60px 空間 */
        padding-top: 70px; 
        
        /* 🔴 關鍵修正：使用 100dvh (動態視窗高度) 解決底部被擋住的問題 */
        height: 100dvh; 
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        overflow: hidden; /* 防止整頁滾動，只讓內容區滾動 */
    }

    /* 2. 標題列：處理手機版重疊與按鈕位置 */
    .replay-header {
        position: sticky;
        /* 🔴 關鍵：對齊到 Sidebar 下方而非螢幕頂部 */
        top: 60px; 
        z-index: 100;
        background: #0d0d12;
        display: flex;
        justify-content: space-between;
        align-items: flex-end; /* 讓標題與按鈕底部對齊 */
        padding: 10px 0 15px 0;
        border-bottom: 1px solid var(--border-color);
        flex-shrink: 0;
    }

    /* 3. 內容紙張：處理左右超出螢幕問題 */
    .replay-paper {
        background: #0d0d12;
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 12px;
        padding: 1.5rem;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        
        flex: 1;
        overflow-y: auto;
        /* 🔴 關鍵：防止內容水平撐開容器 */
        overflow-x: hidden; 
        margin: 1rem 0;
        -webkit-overflow-scrolling: touch;
    }

    /* 4. 文字內容：處理長字串導致的水平溢出 */
    .botc-log-style {
        font-family: 'Inter', 'Monaco', monospace;
        font-size: 0.9rem;
        color: #b0b0b0;
        line-height: 1.7;
        /* 🔴 關鍵：確保文字在窄螢幕也會自動換行 */
        white-space: pre-wrap;
        word-break: break-all; 
        tab-size: 4;
        margin: 0;
    }

    /* 5. 客製化捲動軸 (保持不變) */
    .replay-paper::-webkit-scrollbar { width: 6px; }
    .replay-paper::-webkit-scrollbar-thumb { background: var(--accent-purple); border-radius: 10px; }

    /* 📱 手機版微調：處理左右超出與間距 */
    @media (max-width: 767px) {
        .view-replay-container {
            padding: 0 0.5rem;
            padding-top: 65px; /* 緊貼 Sidebar */
        }
        .replay-paper {
            padding: 1rem;
            margin: 0.5rem 0;
        }
        .replay-header h2 {
            font-size: 1.1rem !important; /* 防止標題太長擠壓按鈕 */
        }
        .botc-log-style {
            font-size: 0.8rem; /* 窄螢幕稍微縮小字體 */
        }
    }
</style>
