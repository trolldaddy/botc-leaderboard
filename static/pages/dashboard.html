<header class="top-header">
    <h2>數據看板 (DASHBOARD)</h2>
</header>

<div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
    <div class="card stat-card">
        <div class="stat-icon" style="color: var(--gold);"><i class="fa-solid fa-gamepad"></i></div>
        <div class="stat-info">
            <span class="stat-label">總對局數</span>
            <h3 id="total-games">--</h3>
        </div>
    </div>
    <div class="card stat-card">
        <div class="stat-icon" style="color: #00ff00;"><i class="fa-solid fa-shield-halved"></i></div>
        <div class="stat-info">
            <span class="stat-label">正義勝率</span>
            <h3 id="good-win-rate">--%</h3>
        </div>
    </div>
    <div class="card stat-card">
        <div class="stat-icon" style="color: #ff4d4d;"><i class="fa-solid fa-skull"></i></div>
        <div class="stat-info">
            <span class="stat-label">邪惡勝率</span>
            <h3 id="evil-win-rate">--%</h3>
        </div>
    </div>
</div>

<div class="dashboard-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
    <div class="card">
        <h3><i class="fa-solid fa-trophy text-gold"></i> 傳奇玩家榜 (勝率排行)</h3>
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>玩家</th>
                        <th>總場次</th>
                        <th>勝場</th>
                        <th>勝率</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-chart-pie text-purple"></i> 陣營分佈</h3>
        <canvas id="team-chart"></canvas>
    </div>
</div>

<script src="/js/dashboard.js"></script>
